<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maths</title>
  <link rel="icon" type="image/png" href="icon.png?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #e0eafc, #cfdef3);
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    header {
      display: flex;
      align-items: center;
      padding: 20px 30px;
      background-color: #ffffff55;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header img {
      width: 35px;
      margin-right: 0px;
    }

    header h2 {
      font-size: 26px;
      color: #333;
    }

    h1.title {
      text-align: center;
      font-size: 48px;
      margin: 40px 0 20px;
      color: #222;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      padding: 40px;
    }

    .card {
      position: relative;
      width: 250px;
      height: 150px;
      border-radius: 20px;
      background: rgb(74, 135, 255);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.241);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s ease;
    }

    .card h1 {
      font-size: 24px;
      z-index: 2;
      text-align: center;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%; 
      width: 100%;
      height: 100%;
      background: black; 
      transition: left 0.4s ease;
      z-index: 1;
}


    .card:hover::before {
      left: 0;
    }

    

    @media (max-width: 600px) {
      .card {
        width: 85%;
        height: 120px;
      }

      h1.title {
        font-size: 32px;
      }
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #ffffff80;
      backdrop-filter: blur(10px);
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.6s ease-out;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <header>
    <a href="https://origine-official.netlify.app/">
      <img src="icon.png" alt="logo">
    </a>
    <h2><i>RIGINE</i></h2>
  </header>

  <h1 class="title">NOTES</h1>

  <div class="container">
    <a href="https://drive.google.com/file/d/1oNAdo4TsJ8IXd6VWLHMAAe3gC5V-8uWL/view?usp=sharing" class="card fade-in"><h1>CHAPTER 1</h1></a>
    <a href="https://drive.google.com/file/d/1OMDJ16bA6e4kVGPmHT6n_F6HB2_zgwzH/view?usp=sharing" class="card fade-in"><h1>CHAPTER 2</h1></a>
    <a href="https://drive.google.com/file/d/1ORKIG6DuSUctiNyzqWW4ZD9Zz6R4UKeD/view?usp=sharing" class="card fade-in"><h1>CHAPTER 3</h1></a>
    <a href="https://drive.google.com/file/d/1OQm3lfBJbWq527w4vB3cQFbdKYvwDIBp/view?usp=sharing" class="card fade-in"><h1>CHAPTER 4</h1></a>
    <a href="https://drive.google.com/file/d/1Nmbmqz1CiL0Fo_DCR2GCjK69vFGfqpXI/view?usp=sharing" class="card fade-in"><h1>CHAPTER 5</h1></a>
    <a href="https://drive.google.com/file/d/1NtWHwv5rTaeaku7vqHCY47r5Bkwtwqji/view?usp=sharing" class="card fade-in"><h1>CHAPTER 6</h1></a>
  </div>

  <footer>
    &copy; 2025 ORIGINE. All rights reserved.
  </footer>

  <script>
    const cards = document.querySelectorAll('.fade-in');

    const observer = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.2
    });

    cards.forEach(card => observer.observe(card));
  </script>

</body>
</html>
